<!DOCTYPE html>
<html>
<head>
<title>Sorry Shreya ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:url("sky.jpg");
background-size:cover;
background-position:center;
height:100vh;
overflow:hidden;
color:white;
}

.overlay{
background:rgba(0,0,0,0.35);
height:100vh;
padding-top:40px;
}

h1{
font-size:38px;
margin-bottom:10px;
}

img{
width:260px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
margin-top:10px;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
margin:20px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#444;
color:white;
position:absolute;
}

#message{
display:none;
font-size:32px;
margin-top:30px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.heart{
position:absolute;
font-size:24px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div class="overlay">

<h1>Shreya I'm Really Sorry 🥺</h1>

<img src="shreya.jpg">

<br>

<button id="yes" onclick="yesClicked()">Hanji ❤️</button>
<button id="no">Nahi Ji 😒</button>

<div id="message">
I Love You So Much Shreya ❤️
</div>

</div>

<script>

let noBtn=document.getElementById("no");

function moveButton(){

let x=Math.random()*(window.innerWidth-120);
let y=Math.random()*(window.innerHeight-120);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);
noBtn.addEventListener("click",moveButton);

function yesClicked(){

document.getElementById("message").style.display="block";

for(let i=0;i<30;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
